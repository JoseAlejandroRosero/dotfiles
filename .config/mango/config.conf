# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes = 1
blur_params_radius = 3.5
blur_params_noise = 0.02
blur_params_brightness = 0.8
blur_params_contrast = 0.9
blur_params_saturation = 1.0

shadows = 1
layer_shadows = 1
shadow_only_floating = 1
shadows_size = 6
shadows_blur = 10
shadows_position_x = 20
shadows_position_y = 20
shadowscolor= 0x000000ff

border_radius=8
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.75

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 0-horizontal,1-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.9
zoom_end_ratio=0.8
fadein_begin_opacity=0.0
fadeout_begin_opacity=0.7
animation_duration_move=350
animation_duration_open=350
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.46,1.0,0.29,1
animation_curve_focus=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=10
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.55
default_nmaster=1
smartgaps=0
center_master_overspread=1
center_when_single_stack=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=10

# Misc
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=1
inhibit_regardless_of_visibility=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=32
drag_tile_to_tile=1
exchange_cross_monitor=1
scratchpad_cross_monitor=1
cursor_time_hideout=15
cursor_theme=Hatsune-Miku
single_scratchpad=0

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us
xkb_rules_variant=altgr-intl

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
scroll_method=2

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=10
gappiv=10
gappoh=20
gappov=20
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:center_tile
tagrule=id:2,layout_name:monocle
tagrule=id:3,layout_name:vertical_scroller
tagrule=id:4,layout_name:deck
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# start-up apps
#exec-once=waybar
exec-once=nm-applet
exec-once=safeeyes
exec-once=keepassxc
exec-once=mpd
exec-once=mpDris2
exec-once=dunst
exec-once=swww-daemon -f bgr
#exec-once=swhks &
#exec-once=swhkd

# Subconfig-Load
source=~/.config/mango/binds.conf
source=~/.config/mango/env.conf
source=~/.config/mango/rules.conf
source=~/.config/mango/matugen-colors.conf
