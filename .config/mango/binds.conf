# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config

# menu and terminal
bind=SUPER,d,spawn,wofi --show drun
bind=SUPER,Return,spawn,kitty

# toggle  and reload waybar
bind=SUPER,b,spawn,pkill -SIGUSR1 waybar
bind=SUPER+SHIFT,b,spawn,pkill -SIGUSR2 waybar

# screenlock
bind=SUPER+CTRL,s,spawn,wlock

# some apps and scripts
bind=SUPER,w,spawn,wallpaper-menu
bind=SUPER+SHIFT,s,spawn,screenshot-menu
bind=SUPER,n,spawn,librewolf

# volume keys
bind=NONE,XF86AudioRaiseVolume,spawn,amixer -D pipewire sset Master 2%+
bind=NONE,XF86AudioLowerVolume,spawn,amixer -D pipewire sset Master 2%-
bind=NONE,XF86AudioMute,spawn,amixer -D pipewire sset Master togglemute

# Media keys, mpd gets controlled by playerctl by mpDris2
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next

# Brightness controll through brigthnessctl
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set 5%+

# exit
bind=SUPER+SHIFT,e,spawn,wlogout
bind=SUPER,q,killclient,

# switch window focus
bind=SUPER,k,focusstack,prev
bind=SUPER,j,focusstack,next

# swap window
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER,Tab,toggleoverview,
bind=SUPER+SHIFT,space,togglefloating,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER,z,toggle_scratchpad

# tile/Monocle/Deck layouts zoom and master client control
bind=SUPER+SHIFT,Return,zoom
bind=SUPER,minus,incnmaster,-1
bind=SUPER+SHIFT,plus,incnmaster,+1

# Stack control, useful in monocle and deck
bind=SUPER+Alt,j,focusstack,next
bind=SUPER+Alt,k,focusstack,prev

# scroller layout
bind=SUPER,e,set_proportion,1.0
bind=SUPER,x,switch_proportion_preset,

# switch layout
bind=SUPER,t,switch_layout

# tag switch
bind=SUPER+CTRL,h,viewtoleft,0
bind=SUPER+CTRL,l,viewtoright,0
bind=CTRL+SUPER+SHIFT,h,tagtoleft,0
bind=CTRL+SUPER+SHIFT,l,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# monitor switch
bind=Alt+SUPER,h,focusmon,left
bind=Alt+SUPER,l,focusmon,right
bind=SUPER+Alt+SHIFT,h,tagmon,left
bind=SUPER+Alt+SHIFT,l,tagmon,right

# gaps
bind=SUPER+SHIFT,t,togglegaps

# movewin
bind=SUPER+SHIFT,Up,movewin,+0,-50
bind=SUPER+SHIFT,Down,movewin,+0,+50
bind=SUPER+SHIFT,Left,movewin,-50,+0
bind=SUPER+SHIFT,Right,movewin,+50,+0
 Rosero Rodriguez
# resizewin
bind=SUPER,Up,resizewin,+0,-50
bind=SUPER,Down,resizewin,+0,+50
bind=SUPER,Left,resizewin,-50,+0
bind=SUPER,Right,resizewin,+50,+0

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_left,toggleoverview,-1
mousebind=NONE,btn_right,killclient,0

# Axis Bindings
axisbind=SUPER,UP,viewtoleft
axisbind=SUPER,DOWN,viewtoright
